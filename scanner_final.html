<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CETI - Scanner de Portaria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#001e40', surface: '#f7f9fc' },
                    fontFamily: { headline: ['Manrope', 'sans-serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f9fc; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto space-y-8 pb-32">
        <header class="text-center">
            <h1 class="font-headline text-3xl font-extrabold text-primary">Controle Portaria</h1>
            <p class="text-slate-500 font-medium">Escaneie o QR Code do aluno</p>
        </header>

        <!-- Scanner -->
        <div class="bg-slate-200 rounded-[3rem] overflow-hidden aspect-square relative border-8 border-white shadow-2xl">
            <div id="reader" class="w-full h-full"></div>
            <div id="loading" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center z-10">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent"></div>
            </div>
            <!-- Feedback Overlay -->
            <div id="feedback" class="hidden absolute inset-0 flex items-center justify-center z-20 animate-in fade-in duration-300">
                <div class="text-center p-8 text-white w-full h-full flex flex-col items-center justify-center">
                    <span id="feedback-icon" class="material-symbols-outlined text-7xl mb-4"></span>
                    <h2 id="feedback-text" class="text-3xl font-bold uppercase tracking-tight"></h2>
                    <button onclick="resetScanner()" class="mt-8 bg-white/20 px-8 py-3 rounded-full font-bold uppercase text-xs hover:bg-white/40">Novo Scan</button>
                </div>
            </div>
        </div>

        <!-- Student Info Card -->
        <div id="student-card" class="hidden bg-white rounded-[2.5rem] p-8 shadow-xl border border-slate-100 animate-in slide-in-from-bottom-5">
            <div class="flex items-center gap-6">
                <img id="student-photo" src="" class="w-20 h-20 rounded-2xl object-cover shadow-md">
                <div>
                    <h3 id="student-name" class="font-headline font-bold text-xl text-primary"></h3>
                    <p id="student-meta" class="text-sm text-slate-500 font-medium"></p>
                    <div id="status-badge" class="mt-2 inline-block px-4 py-1 rounded-full text-[10px] font-bold uppercase"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bcmwsjuaoexupbrqoupf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjbXdzanVhb2V4dXBicnFvdXBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDI4NzksImV4cCI6MjA5MjExODg3OX0.aDO0yOfpPK-Gpm3uGzCCPxNatnz_51WEZp38saQq5P4';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let html5QrcodeScanner;

        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} });
            html5QrcodeScanner.render(onScanSuccess);
        }

        async function onScanSuccess(decodedText) {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const { data, error } = await _supabase.from('students').select('*').eq('qr_code_id', decodedText).single();
                if (error || !data) throw new Error("Não encontrado");

                showStudent(data);
                
                if (data.is_authorized) {
                    showFeedback('success', 'AUTORIZADO');
                    await _supabase.from('access_logs').insert({ student_id: data.id, type: 'OUT' });
                } else {
                    showFeedback('error', 'NEGADO');
                }
            } catch (e) {
                showFeedback('error', 'INVÁLIDO');
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function showStudent(s) {
            document.getElementById('student-card').classList.remove('hidden');
            document.getElementById('student-photo').src = s.photo_url || 'https://via.placeholder.com/150';
            document.getElementById('student-name').textContent = s.full_name;
            document.getElementById('student-meta').textContent = `${s.grade} • ID: ${s.enrollment_id}`;
            const badge = document.getElementById('status-badge');
            badge.textContent = s.is_authorized ? 'AUTORIZAÇÃO ATIVA' : 'SEM AUTORIZAÇÃO';
            badge.className = `mt-2 inline-block px-4 py-1 rounded-full text-[10px] font-bold uppercase ${s.is_authorized ? 'bg-emerald-100 text-emerald-600' : 'bg-red-100 text-red-600'}`;
        }

        function showFeedback(type, text) {
            const fb = document.getElementById('feedback');
            fb.classList.remove('hidden');
            fb.className = `absolute inset-0 flex items-center justify-center z-20 animate-in fade-in duration-300 ${type === 'success' ? 'bg-emerald-500/90' : 'bg-red-500/90'}`;
            document.getElementById('feedback-icon').textContent = type === 'success' ? 'check_circle' : 'cancel';
            document.getElementById('feedback-text').textContent = text;
        }

        function resetScanner() {
            document.getElementById('feedback').classList.add('hidden');
            document.getElementById('student-card').classList.add('hidden');
        }

        startScanner();
    </script>
</body>
</html>
