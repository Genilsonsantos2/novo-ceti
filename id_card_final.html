<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CETI - Carteira Estudantil Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#001e40', surface: '#f7f9fc' },
                    fontFamily: { headline: ['Manrope', 'sans-serif'], body: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f7f9fc; font-family: 'Inter', sans-serif; }
        .id-gradient { background: linear-gradient(135deg, #001e40 0%, #003366 100%); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto space-y-8">
        <header>
            <h1 class="font-headline text-3xl font-extrabold text-primary tracking-tight">Identidade Digital</h1>
            <p class="text-slate-500 font-medium">CETI Nova Itarana • Área do Aluno</p>
        </header>

        <div id="loading" class="text-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-primary border-t-transparent mx-auto mb-4"></div>
            <p class="text-slate-400 font-medium tracking-widest uppercase text-xs">Carregando Identidade...</p>
        </div>

        <div id="content" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8 items-start">
            <!-- ID Card -->
            <div class="id-gradient rounded-[3rem] p-10 text-white shadow-2xl relative overflow-hidden group">
                <div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-white/5 rounded-full blur-3xl group-hover:bg-white/10 transition-all duration-700"></div>
                
                <div class="relative z-10 flex flex-col h-full justify-between">
                    <div class="flex justify-between items-start mb-12">
                        <div class="flex items-center gap-3">
                            <span class="material-symbols-outlined text-4xl opacity-80">school</span>
                            <div class="h-8 w-[1px] bg-white/20"></div>
                            <span class="text-[10px] font-bold tracking-[0.2em] uppercase opacity-60">ESTUDANTE</span>
                        </div>
                        <img src="https://img.icons8.com/ios-glyphs/30/ffffff/menu.png" class="opacity-30">
                    </div>

                    <div class="flex flex-col md:flex-row gap-8 items-center md:items-end">
                        <div class="relative group">
                            <img id="student-photo" src="" class="w-44 h-56 rounded-[2.5rem] object-cover shadow-2xl border-4 border-white/10">
                            <div class="absolute -bottom-4 -right-4 bg-emerald-400 text-primary px-5 py-2 rounded-full text-xs font-bold shadow-xl border-4 border-primary flex items-center gap-1">
                                <span class="material-symbols-outlined text-sm font-bold">check_circle</span>
                                ATIVO
                            </div>
                        </div>
                        <div class="flex-1 space-y-6 text-center md:text-left">
                            <div>
                                <h2 id="student-name" class="font-headline text-3xl font-extrabold leading-tight uppercase tracking-tight"></h2>
                                <p id="student-grade" class="text-white/60 font-medium tracking-wide mt-1"></p>
                            </div>
                            <div class="grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                                <div>
                                    <span class="block text-[9px] uppercase tracking-widest opacity-50 mb-1">Matrícula</span>
                                    <span id="student-id" class="font-bold tracking-wider text-sm"></span>
                                </div>
                                <div class="text-right">
                                    <span class="block text-[9px] uppercase tracking-widest opacity-50 mb-1">Válida até</span>
                                    <span class="font-bold tracking-wider text-sm">DEZ/2026</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- QR Code Detail -->
            <div class="bg-white rounded-[3rem] p-10 shadow-xl border border-slate-100 flex flex-col items-center text-center">
                <span class="text-[10px] font-bold text-slate-400 tracking-[0.3em] uppercase mb-8">Apresente para o Porteiro</span>
                <div class="bg-slate-50 p-8 rounded-[3rem] inline-block border border-slate-100 shadow-inner mb-8">
                    <canvas id="qrcode-canvas" class="w-48 h-48"></canvas>
                </div>
                <p id="qr-id-text" class="font-mono text-sm text-slate-400 mb-6 font-bold"></p>
                <div class="flex items-center gap-2 text-emerald-500 text-xs font-bold uppercase tracking-wider bg-emerald-50 px-6 py-2 rounded-full">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    Autenticado via Blockchain
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bcmwsjuaoexupbrqoupf.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjbXdzanVhb2V4dXBicnFvdXBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1NDI4NzksImV4cCI6MjA5MjExODg3OX0.aDO0yOfpPK-Gpm3uGzCCPxNatnz_51WEZp38saQq5P4';
        const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadStudentData() {
            try {
                // Pegando o primeiro estudante da lista para demonstração
                const { data, error } = await _supabase.from('students').select('*').limit(1).single();
                if (error || !data) throw error;

                document.getElementById('student-photo').src = data.photo_url || 'https://via.placeholder.com/200';
                document.getElementById('student-name').textContent = data.full_name;
                document.getElementById('student-grade').textContent = data.grade;
                document.getElementById('student-id').textContent = data.enrollment_id;
                document.getElementById('qr-id-text').textContent = data.qr_code_id;

                // Gerando QR Code
                QRCode.toCanvas(document.getElementById('qrcode-canvas'), data.qr_code_id, {
                    width: 200,
                    margin: 0,
                    color: { dark: '#001e40', light: '#f7f9fc' }
                });

                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');

            } catch (err) {
                console.error("Erro ao carregar carteirinha:", err);
                document.getElementById('loading').innerHTML = `<p class="text-red-500 font-bold">Erro ao carregar dados. Verifique a tabela students!</p>`;
            }
        }

        loadStudentData();
    </script>
</body>
</html>
